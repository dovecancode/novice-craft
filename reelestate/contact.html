<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Reel Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="css/utils.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media-query.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="navbar-content">
          <div class="logo">
            <a href="/"><img src="img/logo.png" alt="" /></a>
          </div>
          <ul class="nav">
            <li><a href="/">home</a></li>
            <li><a href="#">about us</a></li>
            <li><a href="/forsale">land for sale</a></li>
            <li><a href="#">blog</a></li>
          </ul>
          <a class="btn navbar-contact" href="/contact">contact us</a>
          <div class="navbar-hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </nav>
    <main>
      <section class="contact pad-tb-5">
        <div class="container grid-container">
          <div class="contact-img">
            <img src="img/office.jpg" alt="company" />
          </div>
          <div class="contact-form">
            <form class="form">
              <div class="form-input-group">
                <input type="text" placeholder="Name" />
              </div>
              <div class="form-input-group flex-layout">
                <input type="email" placeholder="Email Address" />
                <input type="tel" placeholder="Phone Number" />
              </div>
              <div class="form-input-group">
                <select>
                  <option selected>Subject</option>
                  <option value="1">Consult</option>
                  <option value="2">Talk to an agent</option>
                  <option value="3">List a land</option>
                </select>
              </div>
              <div class="form-input-group">
                <textarea rows="10" placeholder="Message..."></textarea>
              </div>
              <button class="btn" type="submit">submit</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
